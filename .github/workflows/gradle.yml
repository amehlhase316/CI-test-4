name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # OPT-IN: force JS actions to run under Node 24 so you can smoke-test now
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 18
      uses: actions/setup-java@v5            # <-- upgraded to v5 which moved runtime to Node 24
      with:
        java-version: '18'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5    # <-- use gradle/actions v5 (explicit Node 24 upgrade)

    - name: Build with Gradle Wrapper
      run: ./gradlew build -x test

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 18
      uses: actions/setup-java@v5            # <-- upgraded mirror change
      with:
        java-version: '18'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5    # <-- upgraded

    - name: Build with Gradle Wrapper
      run: ./gradlew whiteBoxTest

